# 应用配置
spring.application.name=jiaoyihang-trade

# 数据库配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/jiaoyihang?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=159753
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.example.demo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 显式扫描 Mapper
mybatis.check-config-location=true

# 服务器配置
server.port=8080

# 上传配置
# upload.path=/www/wwwroot/uploads

upload.path = D:/jiaoyihang/uploads
# JWT 配置
jwt.secret=jiaoyihang-trade-system-secret-key-2024-very-long-and-secure
jwt.expiration=86400000

# 日志配置
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN

# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000


# 限流配置
rate-limit.enabled=true

# ========== AI 配置 ==========
# DeepSeek（国内可用，便宜）
ai.api-url=https://api.deepseek.com/v1/chat/completions
ai.api-key=sk-7ff4ccde46404cafa73bca76ca2c28e6
ai.model=deepseek-chat
ai.timeout-seconds=60

# ========== Spring AI 2.0 (DeepSeek) ==========
spring.ai.deepseek.api-key=${ai.api-key}
spring.ai.deepseek.base-url=https://api.deepseek.com
spring.ai.deepseek.chat.options.model=${ai.model}
spring.ai.deepseek.chat.options.temperature=0.5
spring.ai.deepseek.chat.options.max-tokens=800

# Embedding 用通义千问 DashScope（兼容 OpenAI 接口，1024 维，默认）
# 注意：先把下面的 api-key 换成你自己的 https://dashscope.console.aliyun.com/apiKey
spring.ai.dashscope.api-key=sk-ws-H.RXMXYLM.aGwP.MEQCIHVa-xy9fNdlfw4qmJuQ-4J53BJzDAD15LGevrkiY1iSAiAkuQsQedp2-07dI_al_zTaTK0kzu2YX8b_kyoWmCgzbQ
spring.ai.dashscope.base-url=https://dashscope.aliyuncs.com
spring.ai.dashscope.embedding.options.model=text-embedding-v3
spring.ai.dashscope.embedding.options.dimensions=1024

# Redis 向量存储（Spring AI 2.0 RedisVectorStore 与 Jedis 不兼容，本项目改用 SimpleVectorStore）
# 关闭 starter 自动装配避免它去加载有问题的 RedisVectorStoreAutoConfiguration
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# 内存向量库持久化文件
spring.ai.vectorstore.simple.persist-path=./data/vectorstore.json

# ChatMemory（会话记忆用 Redis 存）
spring.ai.chat-memory.repository.redis.host=${spring.data.redis.host}
spring.ai.chat-memory.repository.redis.port=${spring.data.redis.port}
spring.ai.chat-memory.repository.redis.timeout=${spring.data.redis.timeout}
