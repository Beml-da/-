# 应用配置
spring.application.name=jiaoyihang-trade

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/jiaoyihang?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=159753
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.demo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 显式扫描 Mapper
mybatis.check-config-location=true

# 服务器配置
server.port=8080

# 上传配置
upload.path=D:/jiaoyihang/uploads

# JWT 配置
jwt.secret=jiaoyihang-trade-system-secret-key-2024-very-long-and-secure
jwt.expiration=86400000

# 日志配置
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
