# 应用配置
spring.application.name=jiaoyihang-trade

# 数据库配置（建议通过环境变量覆盖：DB_URL/DB_USERNAME/DB_PASSWORD）
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/jiaoyihang?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:159753}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.example.demo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 显式扫描 Mapper
mybatis.check-config-location=true

# 服务器配置
server.port=${SERVER_PORT:8080}

# 上传配置（建议通过环境变量覆盖）
upload.path=${UPLOAD_PATH:D:/jiaoyihang/uploads}

# JWT 配置（必须通过环境变量覆盖）
jwt.secret=${JWT_SECRET:jiaoyihang-trade-system-secret-key-2024-very-long-and-secure}
jwt.expiration=${JWT_EXPIRATION:86400000}   

# 日志配置
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN

# Redis 配置（建议通过环境变量覆盖）
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=5000


# 限流配置
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}

# ========== AI 配置 ==========
# DeepSeek（国内可用，便宜）
ai.api-url=${AI_API_URL:https://api.deepseek.com/v1/chat/completions}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:deepseek-chat}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:60}

# ========== Spring AI 2.0 (DeepSeek) ==========
spring.ai.deepseek.api-key=${AI_API_KEY:}
spring.ai.deepseek.base-url=${AI_BASE_URL:https://api.deepseek.com}
spring.ai.deepseek.chat.options.model=${AI_MODEL:deepseek-chat}
spring.ai.deepseek.chat.options.temperature=0.5
spring.ai.deepseek.chat.options.max-tokens=800

# Embedding 用通义千问 DashScope（兼容 OpenAI 接口，1024 维，默认）
spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY:}
spring.ai.dashscope.base-url=${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
spring.ai.dashscope.embedding.options.model=text-embedding-v3
spring.ai.dashscope.embedding.options.dimensions=1024

# Redis 向量存储（Spring AI 2.0 RedisVectorStore 与 Jedis 不兼容，本项目改用 SimpleVectorStore）
# 关闭 starter 自动装配避免它去加载有问题的 RedisVectorStoreAutoConfiguration
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# 内存向量库持久化文件
spring.ai.vectorstore.simple.persist-path=${VECTOR_STORE_PATH:./data/vectorstore.json}

# ChatMemory（会话记忆用 Redis 存）
spring.ai.chat-memory.repository.redis.host=${spring.data.redis.host}
spring.ai.chat-memory.repository.redis.port=${spring.data.redis.port}
spring.ai.chat-memory.repository.redis.timeout=${spring.data.redis.timeout}